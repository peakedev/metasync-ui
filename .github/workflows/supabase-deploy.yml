name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - supabase/migrations/**
      - supabase/functions/**
      - supabase/config.toml
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Apply Migrations & Deploy Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: supabase/setup-cli@v1
        with:
          version: 2.76.12
      - run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
      - name: Pull remote migrations applied out-of-band
        run: |
          supabase db pull || true
          if [ -n "$(git diff --name-only -- supabase/migrations/)" ] || [ -n "$(git ls-files --others --exclude-standard -- supabase/migrations/)" ]; then
            echo "new_migrations=true" >> "$GITHUB_ENV"
          fi
      - name: Commit & push new remote migrations
        if: env.new_migrations == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/
          git commit -m "chore: sync remote migrations applied out-of-band"
          git push
      - name: Apply database migrations
        run: supabase db push
      - name: Deploy edge functions
        run: supabase functions deploy
